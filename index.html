<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blast game</title>
    <link rel="stylesheet" href="./main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.js"></script>
</head>

<body>
    <main>
        <div class="head">
            <a href="#" class="exit">خروج</a>
            <h4 class="inventory">موجودی :104,136,772 تومان</h4>
        </div>
        <hr>
        <div class="chart-box">
            <button>... 2.82</button>
            <canvas id="myChart" style="width:100%;max-width:700px"></canvas>
            <h1 id="X"></h1>
        </div>
        <div class="price-input-box">
            <h4 class="price">مبلغ</h4>
            <input type="text" class="price-input" id="price-input" placeholder="8.800.000">
            <span class="twoX">2X</span>
            <div class="tooman">تومان</div>
        </div>
        <div class="auto-withdraw">
            <h3 class="title">برداشت اتوماتیک در این ضریب</h3>
            <span>oo</span>
            <div class="withdraw-input">
                <input type="range">
            </div>
        </div>
        <div class="withdraw-button">
            <!-- <input type="button" class="withdraw" id="start" value="شروع" onclick="start_stop()"> -->
             <button class="start" onclick="start_stop()">شروع</button>
        </div>
        <div class="user-table">
            <div class="game-history">تاریخچه بازی</div>
            <table class="user">
                <tr>
                    <th>انفجار</th>
                    <th>@</th>
                    <th>مبلغ شرط</th>
                    <th>سود</th>
                </tr>
                <tr>
                    <th>-</th>
                    <th>-</th>
                    <th>8.800.00</th>
                    <th>-</th>
                </tr>
                <tr>
                    <th>1.17</th>
                    <th>-</th>
                    <th>-</th>
                    <th>-</th>
                </tr>
                <tr>
                    <th>4.29</th>
                    <th>1.38</th>
                    <th>3.850</th>
                    <th>1.463</th>
                </tr>
                <tr>
                    <th>1.24</th>
                    <th></th>
                    <th>-</th>
                    <th>-</th>
                </tr>

            </table>
        </div>
    </main>


</body>

<script src="script.js"></script>


</html>
